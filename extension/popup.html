<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>linkdm</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 288px;
      padding: 16px;
      margin: 0;
      color: #111827;
    }
    h2 { margin: 0 0 12px; font-size: 16px; color: #0077B5; }
    .status {
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.4;
    }
    .connected { background: #ecfdf5; color: #065f46; }
    .disconnected { background: #fffbeb; color: #92400e; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #0077B5; }
    button {
      width: 100%;
      padding: 8px;
      background: #0077B5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #005885; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    .hint { font-size: 12px; color: #6b7280; margin-top: 10px; }
    .hint a { color: #0077B5; text-decoration: none; }
  </style>
</head>
<body>
  <h2>linkdm</h2>
  <div id="status" class="status disconnected" aria-live="polite" role="status">
    ⚠️ Not connected — paste your token below.
  </div>
  <input id="token-input" type="password" placeholder="lnkdm_..." />
  <button id="action-btn" type="button">Connect</button>
  <p class="hint">
    Get your token from
    <a href="https://beta-login-tawny.vercel.app/dashboard" target="_blank">
      linkdm dashboard
    </a>.
  </p>
  <script src="popup.js"></script>
</body>
</html>
