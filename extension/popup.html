<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>linkdm</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 288px;
      padding: 16px;
      margin: 0;
      color: #111827;
    }
    h2 { margin: 0 0 12px; font-size: 16px; color: #0077B5; }
    .card {
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
    }
    .ok    { background: #ecfdf5; color: #065f46; }
    .warn  { background: #fffbeb; color: #92400e; }
    .error { background: #fef2f2; color: #991b1b; }
    .label { font-weight: 600; margin-bottom: 2px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #0077B5; }
    button {
      width: 100%;
      padding: 8px;
      background: #0077B5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      margin-bottom: 6px;
    }
    button:hover { background: #005885; }
    button.secondary {
      background: #f3f4f6;
      color: #374151;
      font-size: 13px;
      font-weight: 400;
    }
    button.secondary:hover { background: #e5e7eb; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    .hint { font-size: 12px; color: #6b7280; margin-top: 8px; }
    .hint a { color: #0077B5; text-decoration: none; }
    #linkedin-status { display: none; }
  </style>
</head>
<body>
  <h2>linkdm</h2>

  <!-- Token / account status -->
  <div id="token-card" class="card warn" aria-live="polite" role="status">
    <div class="label">⚠️ Not connected</div>
    Paste your token below to start.
  </div>

  <!-- LinkedIn tab status (shown once token is connected) -->
  <div id="linkedin-card" class="card warn" aria-live="polite" role="status" style="display:none">
    <div class="label" id="li-title">Checking LinkedIn…</div>
    <span id="li-detail"></span>
  </div>

  <input id="token-input" type="password" placeholder="lnkdm_..." />
  <button id="action-btn" type="button">Connect</button>
  <button id="open-li-btn" class="secondary" type="button" style="display:none">Open LinkedIn</button>

  <!-- Failed DMs list -->
  <div id="failed-section" style="display:none; margin-top:10px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
      <span style="font-size:12px; font-weight:600; color:#6b7280">Couldn't reach</span>
      <button id="clear-failed-btn" class="secondary" type="button"
        style="width:auto; padding:2px 8px; font-size:11px">Clear</button>
    </div>
    <div id="failed-list"></div>
  </div>

  <p class="hint">
    Get your token from the
    <a href="https://beta-login-tawny.vercel.app/dashboard" target="_blank">
      linkdm dashboard
    </a>.
  </p>
  <script src="popup.js"></script>
</body>
</html>
